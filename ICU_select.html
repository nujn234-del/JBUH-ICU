<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전북대학교병원 중환자실 선택</title>
    <style>
        /* 기본 스타일 초기화 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; line-height: 1.6; color: #333; background-color: #f8f9fa; }

        /* 헤더 디자인 (기존 통일) */
        header { 
            background: linear-gradient(90deg, #0055a5 0%, #ffffff 30%, #ffffff 70%, #0055a5 100%); 
            color: #003366; 
            padding: 15px; 
            text-align: center; 
            border-bottom: 1px solid rgba(0, 85, 165, 0.1);
        }
        .logo-title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        header .header-logo { width: 220px; height: auto; }
        header h1 { font-size: 1.6rem; text-align: left; line-height: 1.2; text-shadow: 0px 0px 5px rgba(255,255,255,0.8); }

        /* 메인 컨테이너 */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            text-align: center;
            color: #0055a5;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .page-desc {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        /* 중환자실 선택 버튼 그리드 */
        .icu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* PC에서는 2열 배치 */
            gap: 15px;
        }

        .icu-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: #333;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
            border: 1px solid #eee;
        }

        .icu-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 85, 165, 0.1);
            background-color: #f0f7ff;
            border-color: #0055a5;
        }

        .icu-icon {
            font-size: 2rem;
            background: #f8f9fa;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .icu-text {
            display: flex;
            flex-direction: column;
        }

        .icu-kor {
            font-weight: bold;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        .icu-eng {
            font-size: 0.9rem;
            color: #0055a5;
            margin-top: 2px;
        }

        /* 하단 뒤로가기 버튼 */
        .back-btn-container {
            text-align: center;
            margin-top: 40px;
        }
        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #666;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .back-btn:hover { background-color: #555; }

        /* 푸터 */
        footer { text-align: center; padding: 3rem 1rem; color: #888; font-size: 0.8rem; background: #eee; margin-top: 50px; }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            header .header-logo { width: 150px; }
            header h1 { font-size: 1.2rem; }
            .container { margin: 20px auto; }
            .icu-grid { grid-template-columns: 1fr; /* 모바일에서는 1열(세로) 배치 */ }
            .icu-card { padding: 15px; }
            .icu-icon { width: 50px; height: 50px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-title-container">
        <img src="./PICTURE/LOGO.PNG" alt="전북대학교병원 로고" class="header-logo">
        <h1>전북대학교병원<br>중환자실 이용 안내</h1> 
    </div>
</header>

<main class="container">
